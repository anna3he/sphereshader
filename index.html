<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sphere Shader</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
:root{--bg:#F5F5F3;--bg-s:#EFEFED;--bg-e:#FFFFFF;--bd:#E2E2DF;--bd2:#C8C8C4;--t:#111110;--t2:#6F6F6B;--t3:#A8A8A4;--ti:#F5F5F3;--ease:cubic-bezier(0.16,1,0.3,1);}
body{background:var(--bg);margin:0;min-height:100vh;height:100vh;display:flex;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;overflow:hidden;}
.shell{background:var(--bg);color:var(--t2);user-select:none;font-weight:400;border:none;border-radius:0;overflow:hidden;width:100%;height:100vh;display:flex;flex-direction:column;}
.top{display:flex;align-items:stretch;border-bottom:1px solid var(--bd);flex:1;min-height:0;}
.canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:40px;position:relative;overflow:hidden;background:var(--bg);}
.meta{position:absolute;top:20px;left:24px;}
.ml{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:2px;}
.mn{font-size:13px;font-weight:500;color:var(--t);letter-spacing:-.015em;}
.ms{font-size:11px;color:var(--t3);margin-top:1px;}
.sphere-outer{position:relative;width:280px;height:280px;display:flex;align-items:center;justify-content:center;}
.sphere-aura{position:absolute;inset:-52px;border-radius:50%;filter:blur(34px);opacity:0.75;pointer-events:none;z-index:0;}
.sphere-inner-glow{position:absolute;inset:-10px;border-radius:50%;background:radial-gradient(circle at 46% 40%,rgba(255,255,255,0.96) 0%,rgba(255,255,255,0.72) 28%,rgba(255,255,255,0.28) 55%,rgba(255,255,255,0.05) 75%,transparent 88%);filter:blur(18px);pointer-events:none;z-index:0;}
#sphere{position:relative;z-index:1;display:block;border-radius:50%;}
.sidebar{width:216px;border-left:1px solid var(--bd);padding:16px 12px;display:flex;flex-direction:column;gap:14px;}
.sec{display:flex;flex-direction:column;gap:6px;}
.sl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);padding-bottom:5px;border-bottom:1px solid var(--bd);}
.preset-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
.preset{aspect-ratio:1;border-radius:50%;cursor:pointer;border:1.5px solid transparent;transition:border-color 120ms,transform 120ms;position:relative;overflow:visible;}
.preset.active{border-color:var(--t2);}
.preset canvas{position:absolute;inset:0;width:100%;height:100%;display:block;border-radius:50%;}
.preset .dx{position:absolute;top:-2px;right:-2px;width:14px;height:14px;background:var(--t);color:var(--bg);border-radius:50%;font-size:9px;display:none;align-items:center;justify-content:center;cursor:pointer;z-index:10;line-height:1;border:1.5px solid var(--bg);}
.preset:hover .dx{display:flex;}
@media(hover:hover){.preset:hover{transform:scale(1.06);}}
.drag-row{display:flex;align-items:center;background:var(--bg-s);border-radius:8px;height:38px;position:relative;overflow:hidden;cursor:ew-resize;}
.drag-fill{position:absolute;left:0;top:0;bottom:0;background:rgba(0,0,0,.045);pointer-events:none;}
.drag-div{position:absolute;width:1px;top:25%;bottom:25%;background:var(--bd2);pointer-events:none;}
.drag-label{position:relative;z-index:1;padding:0 12px;font-size:11px;color:var(--t2);flex:1;}
.drag-val{position:relative;z-index:1;padding:0 12px;font-size:11px;color:var(--t2);font-variant-numeric:tabular-nums;min-width:28px;text-align:right;}
.drag-row.dragging{box-shadow:inset 0 0 0 1px var(--bd2);}
.colour-section{display:flex;flex-direction:column;gap:3px;}
.crow{display:flex;align-items:center;background:var(--bg-s);border-radius:8px;height:38px;padding:0 12px;justify-content:space-between;}
.crl{font-size:11px;color:var(--t2);}
.cswatch{width:20px;height:20px;border-radius:50%;cursor:pointer;position:relative;flex-shrink:0;}
.cswatch input[type=color]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;border:none;padding:0;}
.sp{width:100%;height:100%;border-radius:50%;pointer-events:none;}
.save-row{padding:2px 0;display:flex;justify-content:flex-end;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:0 11px;height:28px;font-size:12px;font-weight:400;letter-spacing:-.01em;border-radius:6px;border:1px solid transparent;cursor:pointer;font-family:inherit;white-space:nowrap;transition:opacity 150ms var(--ease),transform 150ms var(--ease),background 100ms;}
.btn svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:.85;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.btn:active{transform:scale(0.97);}
.btn-primary{background:var(--t);color:var(--ti);}
.btn-secondary{background:var(--bg-s);color:var(--t2);border-color:var(--bd);}
@media(hover:hover){.btn-primary:hover{opacity:.8;}.btn-secondary:hover{border-color:var(--bd2);}}
.bottom-bar{display:flex;align-items:center;justify-content:space-between;padding:9px 18px;border-top:1px solid var(--bd);}
.bn{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);}
</style>
</head>
<body>
<div class="shell">
  <div class="top">
    <div class="canvas-wrap">
      <div class="meta">
        <div class="ml">Shader</div>
        <div class="mn" id="pname">Hallucinate</div>
        <div class="ms">Original mix</div>
      </div>
      <div class="sphere-outer">
        <div class="sphere-aura" id="aura"></div>
        <div class="sphere-inner-glow"></div>
        <canvas id="sphere" width="280" height="280"></canvas>
      </div>
    </div>
    <div class="sidebar">
      <div class="sec">
        <div class="sl">Presets</div>
        <div class="preset-grid" id="pgrid"></div>
      </div>
      <div class="sec">
        <div class="sl">Colours</div>
        <div class="colour-section">
          <div class="crow"><span class="crl">Colour A</span><div class="cswatch"><div class="sp" id="sp-a"></div><input type="color" id="ca" value="#0A0F8F"></div></div>
          <div class="crow"><span class="crl">Colour B</span><div class="cswatch"><div class="sp" id="sp-b"></div><input type="color" id="cb" value="#00E5FF"></div></div>
          <div class="crow"><span class="crl">Highlight</span><div class="cswatch"><div class="sp" id="sp-c"></div><input type="color" id="cc" value="#FFFFFF"></div></div>
        </div>
        <div class="save-row">
          <button class="btn btn-secondary" id="btn-save" onclick="savePreset()" style="display:none;font-size:11px;">Save preset</button>
        </div>
      </div>
      <div class="sec">
        <div class="sl">Controls</div>
        <div style="display:flex;flex-direction:column;gap:3px;">
          <div class="drag-row" id="dr-int" data-min="5" data-max="195" data-val="100" data-out="dv-int"><div class="drag-fill" id="df-int"></div><div class="drag-div" id="dd-int"></div><span class="drag-label">Intensity</span><span class="drag-val" id="dv-int">100</span></div>
          <div class="drag-row" id="dr-soft" data-min="5" data-max="195" data-val="100" data-out="dv-soft"><div class="drag-fill" id="df-soft"></div><div class="drag-div" id="dd-soft"></div><span class="drag-label">Softness</span><span class="drag-val" id="dv-soft">100</span></div>
          <div class="drag-row" id="dr-spd" data-min="5" data-max="195" data-val="100" data-out="dv-spd"><div class="drag-fill" id="df-spd"></div><div class="drag-div" id="dd-spd"></div><span class="drag-label">Speed</span><span class="drag-val" id="dv-spd">100</span></div>
          <div class="drag-row" id="dr-dep" data-min="5" data-max="195" data-val="100" data-out="dv-dep"><div class="drag-fill" id="df-dep"></div><div class="drag-div" id="dd-dep"></div><span class="drag-label">Depth</span><span class="drag-val" id="dv-dep">100</span></div>
        </div>
      </div>
    </div>
  </div>
  <div class="bottom-bar">
    <span class="bn">Sphere shader</span>
    <button class="btn btn-primary" onclick="exportSphere()">
      <svg viewBox="0 0 16 16"><path d="M8 2v9M5 8l3 3 3-3M3 13h10"/></svg>
      Export
    </button>
  </div>
</div>
<script>
const PRESETS=[
  {name:'Hallucinate',a:'#0A0F8F',b:'#00E5FF',c:'#FFFFFF',custom:false},
  {name:'Unknown',    a:'#6600FF',b:'#FF00CC',c:'#FFFFFF',custom:false},
  {name:'Forget You', a:'#2200CC',b:'#AA00FF',c:'#FFFFFF',custom:false},
  {name:'Good & Evil',a:'#CC0000',b:'#FF7700',c:'#FFFFFF',custom:false},
  {name:'Solar',      a:'#FF0066',b:'#FFB700',c:'#FFFFFF',custom:false},
  {name:'Aurora',     a:'#003366',b:'#00FF99',c:'#FFFFFF',custom:false},
];
let customs=[],activeIdx=0,isCustom=false,t=0,customCount=0;
function h2r(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function lerp(a,b,f){return a+(b-a)*f;}
function lerpRgb(a,b,f){return a.map((v,i)=>Math.round(lerp(v,b[i],f)));}
function drawSphere(cv,ca,cb,cc,intensity,softness,time,depth){
  const ctx=cv.getContext('2d');const W=cv.width,H=cv.height,cx=W/2,cy=H/2,R=W/2;
  const img=ctx.createImageData(W,H);const d=img.data;
  const rA=h2r(ca),rB=h2r(cb),rC=[255,255,255];
  const iF=intensity/100,sF=softness/100,dF=depth/100;
  const lx=0.42,ly=-0.58,lz=0.68,ll=Math.sqrt(lx*lx+ly*ly+lz*lz);
  const lnx=lx/ll,lny=ly/ll,lnz=lz/ll;
  for(let y=0;y<H;y++){for(let x=0;x<W;x++){
    const dx=(x-cx)/R,dy=(y-cy)/R,d2=dx*dx+dy*dy;
    if(d2>1)continue;
    const z=Math.sqrt(1-d2);
    const dot=Math.max(0,dx*lnx+dy*lny+z*lnz);
    const diff=Math.pow(dot,0.55);
    const rz=z-2*dot*lnz;
    const spec=Math.pow(Math.max(0,rz),18)*1.2;
    const rim=Math.pow(1-z,1.8)*0.4*dF;
    const ux=dx*.5+.5,uy=dy*.5+.5;
    const swirl=Math.sin(ux*3.6+time*.72)*Math.cos(uy*3.0-time*.58)*.5+.5;
    const flow=Math.sin(Math.sqrt(d2)*3.6-time*1.1+swirl*2.3)*.5+.5;
    const shim=Math.cos(ux*4.8+uy*3.3+time*1.35)*.5+.5;
    let t1=flow*iF+(1-iF)*.5;t1=Math.max(0,Math.min(1,t1));
    let col=lerpRgb(rA,rB,t1);
    const hlF=Math.pow(Math.max(0,shim*(1-Math.sqrt(d2)*.25)-(1-sF)*.08),1.2)*iF*1.3;
    col=lerpRgb(col,rC,Math.min(0.92,hlF));
    const coreGlow=Math.pow(Math.max(0,-dy*.5+z*.85),2.0)*(sF*.7+.2);
    col=col.map(v=>Math.round(Math.min(255,v+(255-v)*coreGlow*.7)));
    const amb=0.62+dF*.06;
    const lit=col.map(v=>{let c=v/255;c=c*(amb+diff*(0.28+dF*.18))+spec*0.95+rim;return Math.round(Math.max(0,Math.min(1,c))*255);});
    const ao=Math.pow(z,0.08*dF+.02);
    const final=lit.map(v=>Math.round(v*ao));
    const alpha=Math.round(255*Math.pow(Math.max(0,1-d2),.13));
    const i=(y*W+x)*4;d[i]=final[0];d[i+1]=final[1];d[i+2]=final[2];d[i+3]=alpha;
  }}
  ctx.putImageData(img,0,0);
}
function drawThumb(cv,ca,cb,cc,time){
  const ctx=cv.getContext('2d');const W=cv.width,H=cv.height,cx=W/2,cy=H/2,R=W/2;
  const img=ctx.createImageData(W,H);const d=img.data;
  const rA=h2r(ca),rB=h2r(cb),rC=[255,255,255];
  const lnx=0.42/1.1,lny=-0.58/1.1,lnz=0.68/1.1;
  for(let y=0;y<H;y++){for(let x=0;x<W;x++){
    const dx=(x-cx)/R,dy=(y-cy)/R,d2=dx*dx+dy*dy;
    if(d2>1)continue;
    const z=Math.sqrt(1-d2);
    const dot=Math.max(0,dx*lnx+dy*lny+z*lnz);
    const diff=Math.pow(dot,.55);
    const rz=z-2*dot*lnz;const spec=Math.pow(Math.max(0,rz),18)*1.1;
    const ux=dx*.5+.5,uy=dy*.5+.5;
    const sw=Math.sin(ux*3.6+time*.72)*Math.cos(uy*3.0-time*.58)*.5+.5;
    const fl=Math.sin(Math.sqrt(d2)*3.6-time*1.1+sw*2.3)*.5+.5;
    const sh=Math.cos(ux*4.8+uy*3.3+time*1.35)*.5+.5;
    let t1=Math.max(0,Math.min(1,fl));
    let col=lerpRgb(rA,rB,t1);
    const hlF=Math.pow(Math.max(0,sh*(1-Math.sqrt(d2)*.25)-.05),1.2)*1.2;
    col=lerpRgb(col,rC,Math.min(0.9,hlF));
    const cg=Math.pow(Math.max(0,-dy*.5+z*.85),2.0)*.55;
    col=col.map(v=>Math.round(Math.min(255,v+(255-v)*cg*.65)));
    const lit=col.map(v=>{let c=v/255;c=c*(0.62+diff*.28)+spec*.9;return Math.round(Math.max(0,Math.min(1,c))*255);});
    const fin=lit.map(v=>Math.round(v*Math.pow(z,.03)));
    const alpha=d2<0.9?255:Math.round(255*Math.max(0,(1-d2)/(1-0.9)));
    const i=(y*W+x)*4;d[i]=fin[0];d[i+1]=fin[1];d[i+2]=fin[2];d[i+3]=alpha;
  }}
  ctx.putImageData(img,0,0);
}
function updateAura(ca,cb){
  const ra=h2r(ca),rb=h2r(cb);
  document.getElementById('aura').style.background=
    `radial-gradient(circle at 44% 40%,rgba(255,255,255,0.9) 0%,rgba(${rb[0]},${rb[1]},${rb[2]},0.92) 22%,rgba(${ra[0]},${ra[1]},${ra[2]},0.72) 55%,transparent 80%)`;
}
function getV(id){return parseInt(document.getElementById(id).dataset.val);}
function setV(rowId,val){
  const row=document.getElementById(rowId);
  const mn=parseInt(row.dataset.min),mx=parseInt(row.dataset.max);
  val=Math.max(mn,Math.min(mx,Math.round(val)));row.dataset.val=val;
  const pct=(val-mn)/(mx-mn)*100;
  document.getElementById(rowId.replace('dr-','df-')).style.width=pct+'%';
  document.getElementById(rowId.replace('dr-','dd-')).style.left=pct+'%';
  document.getElementById(row.dataset.out).textContent=val;
}
function initDrags(){
  ['dr-int','dr-soft','dr-spd','dr-dep'].forEach(id=>{
    const row=document.getElementById(id);setV(id,parseInt(row.dataset.val));
    let drag=false,sx=0,sy=0,sv=0;
    const mn=parseInt(row.dataset.min),mx=parseInt(row.dataset.max);
    function move(cx2,cy2){const rect=row.getBoundingClientRect();setV(id,sv+Math.round((cx2-sx)/rect.width*(mx-mn))+Math.round((sy-cy2)*.5));}
    row.addEventListener('mousedown',e=>{drag=true;sx=e.clientX;sy=e.clientY;sv=getV(id);row.classList.add('dragging');e.preventDefault();});
    window.addEventListener('mousemove',e=>{if(drag)move(e.clientX,e.clientY);});
    window.addEventListener('mouseup',()=>{drag=false;document.querySelectorAll('.drag-row').forEach(r=>r.classList.remove('dragging'));});
    row.addEventListener('wheel',e=>{e.preventDefault();setV(id,getV(id)+Math.round(-e.deltaY*.2));},{passive:false});
    row.addEventListener('touchstart',e=>{drag=true;sx=e.touches[0].clientX;sy=e.touches[0].clientY;sv=getV(id);e.preventDefault();},{passive:false});
    window.addEventListener('touchmove',e=>{if(drag)move(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
    window.addEventListener('touchend',()=>{drag=false;});
  });
}
const mc=document.getElementById('sphere');
function tick(){
  t+=getV('dr-spd')/3800;
  const ca=document.getElementById('ca').value,cb=document.getElementById('cb').value,cc=document.getElementById('cc').value;
  drawSphere(mc,ca,cb,cc,getV('dr-int'),getV('dr-soft'),t,getV('dr-dep'));
  updateAura(ca,cb);
  requestAnimationFrame(tick);
}
function allP(){return[...PRESETS,...customs];}
function buildGrid(){
  const g=document.getElementById('pgrid');g.innerHTML='';
  allP().forEach((p,i)=>{
    const w=document.createElement('div');
    w.className='preset'+(i===activeIdx&&!isCustom?' active':'');
    const pc=document.createElement('canvas');pc.width=64;pc.height=64;
    pc.style.cssText='position:absolute;inset:0;width:100%;height:100%;display:block;border-radius:50%;';
    w.appendChild(pc);
    if(p.custom){const dx=document.createElement('div');dx.className='dx';dx.textContent='×';dx.onclick=e=>{e.stopPropagation();delCustom(i);};w.appendChild(dx);}
    w.onclick=()=>applyPreset(i);g.appendChild(w);
    let pt=Math.random()*Math.PI*2;
    (function loop(){pt+=.01;drawThumb(pc,p.a,p.b,p.c,pt);requestAnimationFrame(loop);})();
  });
}
function applyPreset(i){
  const p=allP()[i];activeIdx=i;isCustom=false;
  document.getElementById('ca').value=p.a;document.getElementById('cb').value=p.b;document.getElementById('cc').value=p.c;
  syncSwatches();document.getElementById('pname').textContent=p.name;
  document.getElementById('btn-save').style.display='none';
  document.querySelectorAll('.preset').forEach((el,j)=>el.classList.toggle('active',j===i));
}
function markCustom(){
  isCustom=true;document.getElementById('pname').textContent='Custom';
  document.querySelectorAll('.preset').forEach(el=>el.classList.remove('active'));
  document.getElementById('btn-save').style.display='flex';
}
function savePreset(){
  customCount++;
  const p={name:'Custom '+customCount,a:document.getElementById('ca').value,b:document.getElementById('cb').value,c:document.getElementById('cc').value,custom:true};
  customs.push(p);isCustom=false;activeIdx=PRESETS.length+customs.length-1;
  document.getElementById('btn-save').style.display='none';
  buildGrid();document.getElementById('pname').textContent=p.name;
  document.querySelectorAll('.preset').forEach((el,j)=>el.classList.toggle('active',j===activeIdx));
}
function delCustom(i){customs.splice(i-PRESETS.length,1);if(activeIdx===i)applyPreset(0);else if(activeIdx>i)activeIdx--;buildGrid();}
function syncSwatches(){['a','b','c'].forEach(k=>{document.getElementById('sp-'+k).style.background=document.getElementById('c'+k).value;});}
['a','b','c'].forEach(k=>{
  const inp=document.getElementById('c'+k);
  document.getElementById('sp-'+k).style.background=inp.value;
  inp.addEventListener('input',()=>{document.getElementById('sp-'+k).style.background=inp.value;markCustom();});
});
function exportSphere(){
  const exp=document.createElement('canvas');exp.width=1200;exp.height=1200;
  drawSphere(exp,document.getElementById('ca').value,document.getElementById('cb').value,document.getElementById('cc').value,getV('dr-int'),getV('dr-soft'),t,getV('dr-dep'));
  const a=document.createElement('a');
  a.download='sphere-'+document.getElementById('pname').textContent.toLowerCase().replace(/\s+/g,'-')+'.png';
  a.href=exp.toDataURL('image/png');a.click();
}
initDrags();buildGrid();applyPreset(0);tick();
</script>
</body>
</html>
